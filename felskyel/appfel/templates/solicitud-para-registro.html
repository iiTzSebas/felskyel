{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'appfel/css/reset.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/global.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/solicitud-para-registro.css' %}" />

</head>

<body>
	<h1 class="title-solicitud-de">Solicitud de registro</h1>
	<div class="por-favor">
		Por favor complete la información requerida para continuar con su registro. Una vez finalice, haga clic en “Enviar”.<br />
		 Recibirá una confirmación a través del método de contacto que haya seleccionado.<br />
		<br />
		
	</div>
	
	<form method="POST" enctype="multipart/form-data">
	{% csrf_token %}
	<div class="row1">
		<label class="text-c">Ingrese información de contacto:</label>
		<input type="text" name="contacto" class="correo-o-numero" placeholder="Correo o número del cel" required>
	</div>
	
	<div class="row-b row2">
		<label class="text-ingrese">Ingrese su nombre completo :</label>
		<input type="text" name="nombre_completo" class="row-rect2" required>
	</div>
	
	<div class="row-b row3">
		<label class="text-ingrese">Ingrese nombre del negocio:</label>
		<input type="text" name="nombre_negocio" class="row-rect2" required>
	</div>
	
	<div class="row-b row4">
		<label class="text-ingrese">Ingrese correo electronico:</label>
		<input type="email" name="email" class="row-rect2" required>
	</div>
	
	<div class="row-b row5">
		<label class="text-ingrese">Ingrese número de contacto:</label>
		<input type="tel" name="telefono" class="row-rect2" required>
	</div>
	
	<div class="row6">
		<label class="text-c">Copia del documeto de indentidad/cedula:</label>
		<input type="file" name="documento_identidad" class="documento" required>
	</div>
	
	<div class="row-b row7">
		<label class="text-ingrese">Ingrese certificado de los productos:</label>
		<input type="file" name="certificado_productos" class="row-rect2">
	</div>
	
	<div class="row8">
		<label class="text-ingrese text-registro-de">
			Registro de marca o distribuidor autorizado (si venden marcas reconocidas):
		</label>
		<input type="file" name="registro_marca" class="rect-b rect-right">
	</div>
	
	<div class="row-b row9">
		<label class="text-ingrese">Ingrese domicilio:</label>
		<input type="text" name="domicilio" class="row-rect2" required>
	</div>
	
	<div class="row-c row10">
		<label class="text-ingrese">Listado preliminar de productos:</label>
		<textarea name="listado_productos" class="rect-b"></textarea>
	</div>
	
	<div class="row-c row11">
		<label class="text-ingrese">Origen de los productos:</label>
		<textarea name="origen_productos" class="rect-b"></textarea>
	</div>
	
	<div class="row12">
		<p class="text-ingrese">Ver terminos y condiciones</p>
		<a href="#" class="btn-ver hover-bright" target="_blank">Ver</a>
	</div>
	
	<button type="submit" class="btn-bottom hover-bright">Enviar</button>
	</form>
</body>

</html>
