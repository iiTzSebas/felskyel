{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
	<title>Restablecer Contraseña</title>
	
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'appfel/css/reset.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/global.css' %}" />
	<!-- Estilo visual específico -->
	<link rel="stylesheet" href="{% static 'appfel/css/rest_passw.css' %}" /> 
</head>

<body>
	<div class="login-container">
		<img src="{% static 'appfel/img/img.png' %}" alt="Logo" class="img-top" />
		<h1 class="title-inicio-sesion">Recuperar cuenta</h1>
		<p class="intro-text">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
		
		<form method="post" action="{% url 'password_reset_request' %}" class="login-form">
			{% csrf_token %}
			<div class="row-a">
				<label for="email">Correo electrónico:</label>
				<input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
			</div>
			<div class="btn-container">
				<button type="submit" class="btn-iniciar">Enviar enlace</button>
			</div>
		</form>
		
		<div class="password-reset-link-container">
			<a href="{% url 'inicio' %}" class="password-reset-link">← Volver al inicio de sesión</a>
		</div>
	</div>
</body>
</html>
