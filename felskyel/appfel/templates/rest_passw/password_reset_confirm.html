{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
	<title>Nueva Contraseña</title>

	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'appfel/css/reset.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/global.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/rest_passw.css' %}" /> 
	<style>
		/* Estilos integrados para el Header */
		.header {
			background-color: #308665;
			padding: 15px 40px;
			display: flex;
			align-items: center;
			justify-content: flex-start !important;
			position: relative;
			width: 100%;
			box-sizing: border-box;
		}
		.header-nav {
			display: flex;
			justify-content: space-between;
			align-items: center;
			width: 100%;
		}
		.header-arrow-left {
			position: static !important;
			transform: none !important;
			margin-right: 15px;
			color: #000;
			display: flex;
			align-items: center;
			text-decoration: none;
		}
		.header-arrow-left svg {
			width: 24px;
			height: 24px;
		}
	</style>
</head>

<body>
	<header class="header">
		<div class="header-nav">
			<div style="display: flex; align-items: center;">
			<a href="javascript:history.back()" class="header-arrow-left" aria-label="Volver a la página anterior">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
						<path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path>
					</svg>
				</a>
				<a href="{% url 'inicio' %}" class="header-text-felskyel body-text3" style="font-size: 1.5rem; font-weight: 700; color: #000; margin: 0; text-decoration: none;">Felskyel</a>
			</div>
		</div>
	</header>
	<div class="login-container">
		<img src="{% static 'appfel/img/img.png' %}" alt="Seguridad" class="img-top" />
		<h1 class="title-inicio-sesion">Nueva contraseña</h1>
		<p class="intro-text">Por favor, ingresa tu nueva contraseña dos veces para confirmarla.</p>

		<!--uidb64=uidb64 token=token--> 
		
		<form method="post" action="" class="login-form" autocomplete="off">
			{% csrf_token %}
			<div class="row-a">
				<label for="new_password1">Nueva contraseña:</label>
				<input type="password" id="new_password1" name="new_password1" required>
			</div>
			<div class="row-a">
				<label for="new_password2">Confirma nueva contraseña:</label>
				<input type="password" id="new_password2" name="new_password2" required>
			</div>
			<div class="btn-container">
				<button type="submit" class="btn-iniciar">Cambiar contraseña</button>
			</div>
		</form>
	</div>
</body>
</html>
