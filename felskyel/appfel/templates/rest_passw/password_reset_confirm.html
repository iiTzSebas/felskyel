{% extends "base.html" %}
{% load static %}

{% block title %}Nueva Contraseña{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{% static 'appfel/css/registro.css' %}" />
    <style>
        .header {
            background-color: #308665;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start !important;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .header-arrow-left {
            position: static !important;
            transform: none !important;
            margin-right: 15px;
            color: #000;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .header-arrow-left svg {
            width: 24px;
            height: 24px;
        }
    </style>
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center my-4">
    <img src="{% static 'appfel/img/img.png' %}" alt="Seguridad" class="img-top" />
</div>

<main class="main-container">
    <div class="registro-form-container">
        <h1 class="title">Nueva contraseña</h1>
        <p class="text-center mb-4" style="color: #666; font-size: 0.95rem;">Por favor, ingresa tu nueva contraseña dos veces para confirmarla.</p>

        <form method="post" action="" class="registro-form" autocomplete="off">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="new_password1">Nueva contraseña</label>
                <div class="input-group">
                    <input type="password" id="new_password1" name="new_password1" class="form-control" placeholder="Crea una contraseña" required>
                    <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('new_password1')">
                        <i class="fa fa-eye" id="icon-new_password1"></i>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label for="new_password2">Confirma nueva contraseña</label>
                <div class="input-group">
                    <input type="password" id="new_password2" name="new_password2" class="form-control" placeholder="Confirma tu contraseña" required>
                    <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('new_password2')">
                        <i class="fa fa-eye" id="icon-new_password2"></i>
                    </span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    Cambiar contraseña
                </button>
            </div>
        </form>
    </div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById('icon-' + fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = "password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
</main>
{% endblock %}
