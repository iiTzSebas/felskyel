{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'appfel/css/reset.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/global.css' %}" />
	<link rel="stylesheet" href="{% static 'appfel/css/perfil.css' %}" />

	
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">

	<title>inicio de sesión</title>
	
</head>

<body>
	<div class="login-container">
	<img src="{% static 'appfel/img/img.png' %}" alt="perfil usuario"  class="img-top" />
	<h1 class="title-inicio-sesion title2">Inicio sesión</h1>
	
	<form method="post" action="{% url 'inicio' %}" class="login-form" autocomplete="on">
		{% csrf_token %}
		<div class="row-a row1">
			<label for="fname">Nombre/correo electrónico:</label>
			<input type="text" id="fname" name="fname" required>
		</div>
		
		<div class="row-a row2">
			<label for="pwd">Contraseña:</label>
			<input type="password" id="pwd" name="pwd" required>
		</div>
		<div class="btn-container">
			<button type="submit" class="btn-iniciar hover-bright text2">Iniciar</button>
		</div>
	</form>

	<br>
	<div class="password-reset-link-container">
		<!-- Este enlace llevará a la página para solicitar el restablecimiento -->
		<a href="{% url 'password_reset_request' %}" class="password-reset-link">¿Olvidaste tu contraseña?</a>
	</div>

	<h2 class="subtitle-crear-cuenta subtitle2">Crear cuenta</h2>
	<button class="btn-bottom text2 hover-dark"
	onclick="window.open('{% url 'registro' %}', '_blank')"
	>Iniciar registro</button>
	</div>


</body>

</html>
