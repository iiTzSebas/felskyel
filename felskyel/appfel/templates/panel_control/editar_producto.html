{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Producto - {{ producto.nombre }}{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{% static 'appfel/css/admin_productos.css' %}">
    <style>
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
                color: #e6edf3;
            }
            .card-admin {
                background-color: #161b22;
                border: 1px solid #30363d;
            }
            .card-header-custom {
                background-color: #21262d;
                color: #6affc3;
                border-bottom: 1px solid #30363d;
            }
            .form-label {
                color: #e6edf3;
            }
            .form-control {
                background-color: #0d1117;
                color: #fff;
                border-color: #30363d;
            }
            .text-muted {
                color: #8b949e !important;
            }
        }
    </style>
{% endblock %}

{% block content %}
<div class="container admin-container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card-admin shadow">
                <div class="card-header-custom">Editar Producto: {{ producto.nombre }}</div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nombre del producto</label>
                            <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio (COP)</label>
                            <input type="number" name="precio" class="form-control" value="{{ producto.precio }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad en Stock</label>
                            <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="4">{{ producto.descripcion }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Imagen actual</label><br>
                            <img src="{{ producto.imagen_url }}" class="img-thumbnail mb-2" style="max-height: 150px;">
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                            <small class="text-muted">Deja en blanco si no deseas cambiar la imagen.</small>
                        </div>
                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" name="disponible" id="stockSwitch" {% if producto.disponible %}checked{% endif %}>
                            <label class="form-check-label" for="stockSwitch">Disponible en stock</label>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-add flex-grow-1">Guardar Cambios</button>
                            <a href="{% url 'productos:admin_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
